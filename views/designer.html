@{layout('')}

<!DOCTYPE html>
<html>
<head>
	<title>---</title>
	<meta charset="utf-8" />
	<meta http-equiv="X-UA-Compatible" content="IE=10" />
	<meta name="format-detection" content="telephone=no" />
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no, viewport-fit=cover" />
	<meta name="robots" content="all,follow" />
	<link rel="stylesheet" href="/spa.min@20.css" />
	<script src="/spa.min@20.js"></script>
	<script src="@{REPO.ui}"></script>
	<link rel="icon" href="/favicon.ico" type="image/x-icon" />
	<style>

		html,body { padding: 0; margin: 0; overflow: hidden; }
		body { background-color: #FFF; }

		:root {
			--radius: 5px;
		}

		.button { background-color: #F6F6F6; border-radius: var(--radius); border: 1px solid #E0E0E0; outline: 0; cursor: pointer; width: 100%; display: block; color: #000; user-select: none; height: 28px; font-size: 12px; }
		.button-inline { position: relative; display: inline-block; width: auto; padding: 0 20px; }
		.button i { margin-right: 5px; }
		.button:hover { background-color: #F0F0F0; }
		.button:disabled { background-color: #E0E0E0; color: #777; cursor: not-allowed; box-shadow: none; border-color: #E0E0E0; }

		.ui-flow header .button { width: auto; }
		.ui-flow header { padding: 8px; font-size: 13px; }
		.ui-flow header > i { color: #FFF; margin-right: 5px; width: 18px; height: 18px; line-height: 18px; border-radius: 3px; text-align: center; font-size: 11px; vertical-align: middle; }
		.ui-flow header > i.ti { transform: scale(1); font-size: 14px; }
		.ui-flow .component { box-shadow: 2px 2px 13px rgba(0,0,0,0.15); border-width: 0; max-width: 250px; border-color: #FFF; }
		.ui-flow .component.isnewbie:before { content: '\ea05'; color: #E8483F; position: absolute; left: 0; top: -25px; font-family: 'totaljs'; }
		.ui-flow .component.iserror { border-color: #E8483F; border-bottom-width: 2px; }
		.ui-flow .component.iserror:before { content: '\e93a'; color: #E8483F; position: absolute; left: 0; top: -25px; font-family: 'totaljs'; }
		.ui-flow .component-selected { outline: 2px solid var(--color) !important; }
		.ui-dark .ui-flow .component-selected { border-color: var(--color) !important; }
		.ui-flow-h summary { padding: 5px 8px 12px; font-size: 13px; font-style: normal; border-top: 3px solid rgba(0,0,0,0.1); display: block; position: relative; }
		.ui-flow-h summary > div { max-height: 200px; }
		.ui-flow-h summary .towindow { position: absolute; top: 5px; right: 5px; color: #000; cursor: pointer; }
		.ui-flow-h summary > div { padding-top: 7px; width: auto; }
		.ui-flow-h summary > span { font-size: 11px; color: #777; }
		.ui-flow-h .output { line-height: 22px; font-size: 11px; }
		.ui-flow-h .output .component-io { line-height: 22px; margin-top: 5px; margin-right: -13px; }
		.ui-flow-h .input { line-height: 22px; font-size: 11px; }
		.ui-flow-h .input .component-io { line-height: 22px; margin-top: 5px; margin-left: -13px; }
		.ui-flow-h .input.connected { font-weight: bold; }
		.ui-flow-h .output.connected { font-weight: bold; }
		.ui-flow .connection { stroke-width: 2.5px; }
		.ui-flow .content { padding: 0; min-width: 150px; }
		.ui-flow footer { border-top: 1px solid rgba(0,0,0,0.1); }
		.ui-flow .output.connected .component-io.disabled, .ui-flow .input.connected .component-io.disabled, .ui-flow .output .component-io.disabled, .ui-flow .input .component-io.disabled { width: 12px !important; height: 12px !important; margin-top: 5px !important; }
		.ui-flow .output-transform { background-color: rgba(0,0,0,0.04); }
		.ui-flow .output[data-index="error"] { color: #E8483F; }
		.ui-flow .component-io { transition: 0.3s all; width: 11px; height: 11px; line-height: 11px; }
		.ui-flow .output.connected .component-io.disabled,.ui-flow .input.connected .component-io.disabled,.ui-flow .output .component-io.disabled,.ui-flow .input .component-io.disabled { background-color: red !important; color: #FFF; border-radius: 100px; width: 16px; height: 16px; margin-top: 6px; }
		.ui-flow-grid { stroke: #F3F3F3; }
		.ui-flow .area { border-radius: var(--radius); }
		.ui-dark .ui-flow-grid { stroke: #202020; }

		.connection-type-transform.highlight.connection-selected { stroke-dasharray: 4; }
		.connection-type-transform.connection-selected { stroke-dasharray: 10; }

		.ui-windows-item { box-shadow: 0 2px 20px rgba(0,0,0,0.1); background: #FFF url(data:image/svg+xml;base64,PHN2ZyB3aWR0aD0iMzgiIGhlaWdodD0iMzgiIHhtbG5zPSJodHRwOi8vd3d3LnczLm9yZy8yMDAwL3N2ZyI+PGRlZnM+PGxpbmVhckdyYWRpZW50IHgxPSI4LjA0MiUiIHkxPSIwJSIgeDI9IjY1LjY4MiUiIHkyPSIyMy44NjUlIiBpZD0iYSI+PHN0b3Agc3RvcC1jb2xvcj0iI0EwQTBBMCIgc3RvcC1vcGFjaXR5PSIwIiBvZmZzZXQ9IjAlIi8+PHN0b3Agc3RvcC1jb2xvcj0iI0EwQTBBMCIgc3RvcC1vcGFjaXR5PSIuNjMxIiBvZmZzZXQ9IjYzLjE0NiUiLz48c3RvcCBzdG9wLWNvbG9yPSIjQTBBMEEwIiBvZmZzZXQ9IjEwMCUiLz48L2xpbmVhckdyYWRpZW50PjwvZGVmcz48ZyB0cmFuc2Zvcm09InRyYW5zbGF0ZSgxIDEpIiBmaWxsPSJub25lIiBmaWxsLXJ1bGU9ImV2ZW5vZGQiPjxwYXRoIGQ9Ik0zNiAxOGMwLTkuOTQtOC4wNi0xOC0xOC0xOCIgc3Ryb2tlPSJ1cmwoI2EpIiBzdHJva2Utd2lkdGg9IjIiPjxhbmltYXRlVHJhbnNmb3JtIGF0dHJpYnV0ZU5hbWU9InRyYW5zZm9ybSIgdHlwZT0icm90YXRlIiBmcm9tPSIwIDE4IDE4IiB0bz0iMzYwIDE4IDE4IiBkdXI9IjAuOXMiIHJlcGVhdENvdW50PSJpbmRlZmluaXRlIi8+PC9wYXRoPjxjaXJjbGUgZmlsbD0iI0EwQTBBMCIgY3g9IjM2IiBjeT0iMTgiIHI9IjEiPjxhbmltYXRlVHJhbnNmb3JtIGF0dHJpYnV0ZU5hbWU9InRyYW5zZm9ybSIgdHlwZT0icm90YXRlIiBmcm9tPSIwIDE4IDE4IiB0bz0iMzYwIDE4IDE4IiBkdXI9IjAuOXMiIHJlcGVhdENvdW50PSJpbmRlZmluaXRlIi8+PC9jaXJjbGU+PC9nPjwvc3ZnPg==) no-repeat 50% 50%; background-size: 80px 80px; }
		.ui-windows-item .ui-viewbox { background-color: #FFF; }
		.ui-dark .ui-windows-item .ui-viewbox { background-color: #151515; }

		.clickable { cursor: pointer; }
		.component figure > header > .button { float: right; height: 20px; font-size: 11px; padding: 0 5px; }
		.component figure > header > .button { background-color: #FFF; color: #111; border-color: #A0A0A0; }
		.ui-dark .component figure > header > .button { background-color: #202020; color: #FFF; border-color: #888; }

		.markdown p { color: #000; }
		.markdown pre { background-color: #F8F8F8; padding: 10px; border-radius: var(--radius); margin: 0; }
		.markdown-small .markdown p { font-size: 14px !important; }

		.ui-dark .markdown p { color: #999; }
		.ui-dark .markdown pre { background-color: #404040; }

		.controls { float: right; margin-right: 10px; }
		.controls button { width: 22px; height: 22px; border: 0; background-color: #FFF; line-height: 22px; padding: 0 5px; border-radius: var(--radius); margin-left: 2px; }
		.controls button:first-child { margin-left: 0; }
		.controls button:hover { background-color: #F0F0F0; }

		.colorize { animation: colorize 1.3s infinite alternate; }

		@keyframes colorize {
			0% { color: #d7cd17; }
			15% { color: #83c83c; }
			30% { color: #2e67c5; }
			45% { color: #b92865; }
			60% { color: #62c9ca; }
			75% { color: #FFF; }
			100% { color: #8c42f6; }
		}

		.fdesigner { background: #F8F8F8; }
		.ui-dark .fdesigner { background: #181818; }

		.fheader { height: 50px; padding: 0 10px; border-bottom: 1px solid #E0E0E0; background-color: transparent; }
		.fheader .info { float: right; font-size: 11px; color: #999; text-align: right; line-height: 14px; padding-top: 10px; }
		.fheader label, .fheader > span { line-height: 50px; font-weight: bold; font-size: 15px; float: left; color: #000; }
		.fheader > span:hover { text-decoration: none; }
		.fheader label i, .fheader > span i { margin-right: 7px; }
		.fheader > span { font-size: 16px; }
		.fheader > span i { background-color: var(--color); padding: 7px; color: #FFF; border-radius: var(--radius); font-size: 18px; margin-right: 10px; }
		.fheader .apply { font-weight: bold; color: #000; font-size: 14px; }
		.fheader .apply i { color: #68B25B; }
		.fheader .buttons { padding: 8px 0 0; text-align: center; display: block; font-size: 16px; }
		.fheader .buttons button { border: 0; margin-left: 5px; float: left; border-radius: var(--radius); height: 32px; min-width: 28px; padding: 0 8px; background-color: transparent; color: #888; display: flex; justify-content: center; flex-wrap: nowrap; align-items: center; }
		.fheader .buttons button span { font-size: 13px; }
		.fheader .buttons button:hover { background-color: #F0F0F0; color: #000; }
		.fheader .buttons button:first-child { margin-left: 0; }

		.ui-dark .ui-columns > section { border-color: #303030 !important; }
		.ui-dark .fheader { border-bottom-color: #303030; background-color: transparent; }
		.ui-dark .fheader label, .ui-dark .fheader > span { color: #FFF; }
		.ui-dark .fheader .apply { color: #FFF; }
		.ui-dark .fheader .apply i { color: #68B25B; }
		.ui-dark .fheader .buttons button:hover { background-color: #303030; color: #FFF; }

		.ispaused .fheader .buttons .pause { background-color: #ff00001c; color: #e63b3b; }

		/* .fheader .apply button { border: 1px solid transparent; background-color: transparent; height: 30px; padding: 0 5px; border-radius: var(--radius); width: 150px; color: #888; } */
		/* .fheader .apply button:hover { background-color: #F0F0F0; color: #000; } */
		/* .fheader .apply button i { margin-right: 5px; color: #68B25B; } */
		.fheader button.highlight { background-color: var(--color) !important; color: #FFF; border-color: var(--color); }
		.fheader button.highlight:hover { color: #FFF !important; }
		.fheader button.highlight i { color: #FFF; }
		.fheader button.alert i { color: #E73323; }
		.fheader button.alert { background-color: rgba(231,51,35,0.05) !important; }

		.ffooter { height: 30px; border-top: 1px solid #E0E0E0; font-size: 12px; background-color: #FFF; }
		.ffooter > div { line-height: 30px; border-left: 1px solid #E0E0E0; padding: 0 10px; text-align: center; }
		.ffooter > div:first-child { border-left: 0; }
		.ffooter span { color: #888; }
		.ffooter i { margin-right: 5px; }

		.ui-dark .ffooter { border-top-color: #303030; background-color: #202020; }
		.ui-dark .ffooter > div { border-left-color: #303030; }
		.ui-dark .ffooter span { color: #888; }

		.fcomponents .ui-searchinput { border: 0; border-bottom: 1px solid #E0E0E0; padding-left: 5px; }
		.ui-dark .fcomponents .ui-searchinput { border-bottom-color: #303030; }

		.fcomponents2 { padding: 10px 15px; display: block; }
		.fcomponents2 > .group { line-height: 20px; font-size: 12px; padding: 0; color: #999; margin-bottom: 4px; margin-top: 10px; }
		.fcomponents2 > .group:first-child { margin-top: 0; }
		.fcomponents2 > .com { line-height: 26px; cursor: pointer; font-size: 12px; padding: 0 5px; margin-bottom: 2px; background-color: #F9F9F9; border-radius: var(--radius); }
		.fcomponents2 > .com span { float: right; font-size: 11px; color: #777; max-width: 60px; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
		.fcomponents2 > .com:hover { opacity: 0.8; }
		.fcomponents2 > .com i { margin-right: 5px; color: var(--color); }
		.fcomponents2 > .comgroup { border: 1px solid #E0E0E0; background-color: transparent; }
		.ui-dark .fcomponents2 > .comgroup { border: 1px solid #303030; }

		.flowsearchwindow { background-color: #FFF; }
		.flowsearchwindow .item { height: 28px; border-bottom: 1px solid #E0E0E0; font-size: 12px; line-height: 27px; cursor: pointer; }
		.flowsearchwindow .item:hover { background-color: rgba(0,0,0,.03); }
		.flowsearchwindow .monospace { float: left; margin: 6px 5px 0 5px; padding: 0 3px; color: #777; font-size: 11px; background-color: rgba(0,0,0,.08); line-height: 16px; border-radius: var(--radius); }
		.flowsearchwindow .name { text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
		.flowsearchwindow .name i { width: 13px; text-align: center; margin-right: 5px; }
		.flowsearchwindow .name code { font-size: 11px; color: #999; margin-left: 5px; }
		.flowsearchwindow .ishidden { color: #E73323; }
		.flowsearchwindow .singleton { color: #5C1DC4; }
		.flowsearchwindow .controls span { margin-left: 7px; cursor: pointer; }

		.fsettings { background-color: #FFF; }
		.fsettings > nav { padding: 0 15px 0; border-top: 1px solid #E0E0E0; background-color: #FFF; border-radius: 0 0 3px 3px; line-height: 65px; height: 65px; display: block; float: none; width: 100%; }
		.fsettings > nav button { border: 0; margin: 15px 0 0; background-color: #F0F0F0; height: 34px; padding: 0 20px; color: #000; cursor: pointer; font-family: Arial; line-height: 34px; vertical-align: middle; outline: 0; font-size: 14px; text-decoration: none; transition: all 0.3s; float: left; width: 50%; }
		.fsettings > nav button i { width: 15px; text-align: center; margin-right: 5px; }
		.fsettings > nav button:hover { opacity: 0.8; }
		.fsettings > nav button:active { background-color: #D0D0D0; }
		.fsettings > nav button:disabled { background-color: #F5F5F5 !important; border-color: #E0E0E0 !important; color: silver !important; cursor: not-allowefsettings-shadow: none; }
		.fsettings > nav button:disabled i { color: silver !important; }
		.fsettings > nav button:first-child { border-top-left-radius: var(--radius); border-bottom-left-radius: var(--radius); }
		.fsettings > nav button:last-child { border-top-right-radius: var(--radius); border-bottom-right-radius: var(--radius); }
		.fsettings > nav button[name='submit'] { font-weight: bold; background-color: var(--color); color: #FFF; }

		.fsettings > .actions ui-component { float: right; }
		.fsettings > .actions { border-bottom: 1px solid #E0E0E0; padding: 10px; height: 42px; background-color: #F7F7F7; }
		.fsettings > .actions button { border: 0; height: 24px; padding: 0 5px; font-size: 12px; background-color: transparent; border-radius: var(--radius); margin-right: 5px; }
		.fsettings > .actions button:hover { background-color: #FFF; }

		.ui-dark .fsettings > .actions { border-bottom-color: #303030; background-color: #202020; }
		.ui-dark .fsettings > .actions button { background-color: transparent; }
		.ui-dark .fsettings > .actions button:hover { background-color: #FFF; }

		.ui-dark .fsettings { background-color: #202020; }
		.ui-dark .fsettings > nav { border-top-color: #303030; background-color: #202020; }
		.ui-dark .fsettings > nav button { background-color: #303030; color: #FFF; }
		.ui-dark .fsettings > nav button[name='submit']:active { background-color: #404040; }
		.ui-dark .fsettings > nav button[name='submit']:disabled { background-color: #353535 !important; border-color: #404040 !important; color: silver !important; }
		.ui-dark .fsettings > nav button[name='submit']:disabled i { color: silver !important; }
		.ui-dark .fsettings > nav button[name='submit'] { background-color: var(--color) !important; color: #FFF !important; }


	</style>
</head>
<body@{if model.darkmode} class="ui-dark"@{fi}>

	<ui-component name="LAZY approve" config="cancel:@(Cancel)"></ui-component>
	<ui-component name="LAZY autocomplete"></ui-component>
	<ui-component name="LAZY clipboard"></ui-component>
	<ui-component name="LAZY colorpicker"></ui-component>
	<ui-component name="LAZY datepicker" config="today:@(Today);days:@(Sunday,Monday,Tuesday,Wednesday,Thursday,Friday,Saturday);clear:@(Clear);months:@(January,February,March,April,May,Juny,July,August,September,October,November,December)"></ui-component>
	<ui-component name="LAZY directory" config="placeholder:@(Search);create:@(Create)"></ui-component>
	<ui-component name="LAZY filereader"></ui-component>
	<ui-component name="LAZY filesaver"></ui-component>
	<ui-component name="LAZY fileuploader"></ui-component>
	<ui-component name="LAZY floatingbox"></ui-component>
	<ui-component name="LAZY icons" config="list:/icons-db.html"></ui-component>
	<ui-component name="LAZY menu" config="style:2"></ui-component>
	<ui-component name="LAZY message" config="button:@(OK)"></ui-component>
	<ui-component name="LAZY notify" config="position:bottom right"></ui-component>
	<ui-component name="LAZY printer"></ui-component>
	<ui-component name="LAZY prompt" config="cancel:@(Cancel);submit:@(OK);zindex:200"></ui-component>

	<ui-component name="edit"></ui-component>
	<ui-component name="errorhandler" config="offline:@(No internet connection.)"></ui-component>
	<ui-component name="exec"></ui-component>
	<ui-component name="imageviewer" config="unknown:@(Unknown image)"></ui-component>
	<ui-component name="loading"></ui-component>
	<ui-component name="locale" config="requests:1;language:@{language}"></ui-component>
	<ui-component name="markdown" config="cdn:@{#}/"></ui-component>
	<ui-component name="shortcuts"></ui-component>
	<ui-component name="windows" path="*windows" config="zindex:50"></ui-component>

	<ui-plugin path="flow" class="flow">

		<ui-component name="dropfiles" config="exec:?/dropfiles;check:?/checkdrop" class="hidden">
			@(Drag &amp; Drop files here)
		</ui-component>

		<ui-component name="title" path="?.head.name" config="plus:0;empty:---"></ui-component>
		<ui-component name="console2" path="?.console" config="name:@(Console);datasource:?.logs;clear:?/resetlogs;autoshow:0"></ui-component>

		<ui-bind path="?.head.id" config="visible" class="invisible">

			<header class="fheader">

				<ui-bind path="?.info.selected" config="template" class="info">
					<script type="text/html">
						{{ if value && value.component }}
						<div>{{ value.Component.name }}<i class="{{ value.Component.icon }} ml5"></i></div>
						<span class="monospace b">{{ value.id }}</span>
						{{ fi }}
					</script>
				</ui-bind>

				<ui-bind path="?.changed" config=".highlight .apply">
					<ui-bind path="?.logs" config=".alert .errors:value && value.length">
						<ui-bind class="buttons" path="?.toolbar" config="template:button">
							<script type="text/html">
								{{ foreach m in value }}
									<button class="exec{{ if m.class }} {{ m.class }}{{ fi }}" data-index="{{ $index }}" data-exec="{{ if m.callback }}?/toolbar{{ else }}{{ m.id }}{{ fi }}"{{ if m.title }} title="{{ m.title }}"{{ fi }}><i class="{{ m.icon }}{{ if m.name }} mr5{{ fi }}"></i>{{ if m.name }}<span>{{ m.name }}</span>{{ fi }}</button>
								{{ end }}
							</script>
						</ui-bind>
					</ui-bind>
				</ui-bind>
			</header>

			<ui-component name="columns" config="parent:window;margin:50" class="hidden invisible">

				<section data-size="200" class="fcomponents">
					<ui-component name="searchinput" path="?.search" config="type:search;placeholder:@(Search components);autofocus:2"></ui-component>
					<ui-component name="viewbox" config="parent:auto;margin:30" class="invisible">
						<ui-component name="search" path="?.search" config="datasource:?.components2;selector:.exec,.group;attribute:title">
							<ui-bind path="?.components2" config="template:div" class="fcomponents2">
								<script type="text/html">

									<div class="com comgroup" data-id="group" draggable="true" data-search="@(Group)">
										<i class="ti ti-object-group"></i>
										@(Group)
									</div>

									{{ foreach g in value }}
										<div class="group" title="">{{ g.name }}</div>
										{{ foreach m in g.items }}
											<div data-id="{{ m.id }}" class="com exec exec3 hellip{{ if m.type }} type-{{ m.type }}{{ fi }}" data-exec3="?/contextmenu2" data-id="{{ m.id }}" draggable="true" data-search="{{ m.name }}{{ if m.schema }} {{ m.schema }}{{ fi }}" data-exec="?/readme" title="{{ if m.schema }}{{ m.name }} / {{ m.schema }}{{ else }}{{ m.name }}{{ fi }}"{{ if g.color }} style="background-color:{{ g.color | rgba(0.15) }}"{{ fi }}>{{ if m.schema }}<span>{{ m.name }}</span>{{ fi }}<i class="{{ m.icon | empty('ti ti-dot-circle') }}" style="color:{{ g.color }}"></i>{{ if m.schema }}{{ m.schema }}{{ else }}{{ m.name }}{{ fi }}</div>
										{{ end }}
									{{ end }}
								</script>
							</ui-bind>
						</ui-component>
					</ui-component>
				</section>

				<section class="fdesigner">
					<ui-component name="viewbox" config="parent:auto;visibleX:true;visibleY:true;scrollbar:true;margin:30;scrollbarshadow:0;$id:flowviewbox">
						<ui-component name="flow" path="?.data" config="width:10000;height:10000;markers:0;grid:18;horizontal:1;snapping:0;=curvedlines:?.options.curvedlines;steplines:1;infopath:?/refreshinfo;outputoffsetY:1;inputoffsetY:1;undopath:?.undo;redopath:?.redo;ondrop:?/drop;contextmenu:?/contextmenu;dblclick:?/settings;onmove:?/onmove;onpause:?/onpause;onconnect:?/onconnect;$assign:Designer;dblclickgroup:?/group;animationlimit:300;animationlimitconnection:3"></ui-component>
					</ui-component>
					<ui-bind class="ffooter grid-6" path="!?.stats" config="template:div;visible">
						<script type="text/html">
							<div><i class="ti ti-calculator"></i>@(Messages): <span>{{ value.messages | format(0) | empty }}</span></div>
							<div><i class="ti ti-spinner"></i>@(Pending): <span>{{ value.pending | format(0) | empty }}</span></div>

	<script type="text/plain" id="template_component">
<SCR total>

	exports.id = '{id}';
	exports.name = 'Your component name';
	exports.icon = 'ti ti-code';
	exports.author = 'Total.js';
	exports.version = '1';
	exports.group = 'Common';
	exports.config = {};
	exports.inputs = [{ id: 'input', name: 'Input' }];
	exports.outputs = [{ id: 'output', name: 'Output' }, { id: 'error', name: 'Error' }];

	// exports.npm = ['npm_module_1', 'npm_module_2@version'];
	// exports.meta = { readonly: false, singleton: false, hidden: false };

	exports.make = function(instance, config) {

		// instance.main.variables {Object}
		// instance.main.variables2 {Object}
		// instance.save();
		// instance.replace(str); // replaces {variable_name} for values from "variables" and "variables2"
		// instance.status(obj, [refresh_delay_in_ms]);

		instance.message = function($) {
			var data = $.data;
			$.send('output', data);
			// or $.send('error', data);
			// or $.destroy();
		};

		instance.configure = function() {
			// "config" is changed
		};

		instance.close = function() {
			// this instance is closed
		};

			exports.load_design = function(response) {

				let uninitializedcount = 0;
				let count = 0;
				let blacklist = { tabs: 1, paused: 1, groups: 1 };
				let instances = [];

				model.checksum = exports.sumchecksum(response);
				exports.set('ready', false);

				for (let key in response) {
					if (key !== 'paused' && key !== 'groups' && key !== 'tabs')
						response[key].connected = true;
				}

				for (let key in model.data) {
					if (!blacklist[key]) {
						let instance = model.data[key];
						if (instance.changes && instance.changes.newbie) {
							let item = {};
							item.id = key;
							item.changes = instance.changes;
							item.connections = instance.connections;
							item.config = instance.config;
							item.component = instance.component;
							item.x = instance.x;
							item.y = instance.y;
							item.note = instance.note;
							item.tab = instance.tab;
							item.connected = false;
							response[key] = item;
							uninitializedcount++;
						}
					}
				}

				for (let key in response) {

					if (blacklist[key])
						continue;

					let obj = response[key];
					let com = model.components.findItem('id', obj.component);

					if (com == null) {
						// component not found
						WARN('Component "{0}" not found'.format(obj.component));
						delete response[key];
						continue;
					}

					obj.Component = com;
					obj.name = com.name.slug().replace(/\-/g, '');
					obj.html = '<figure>' + com.html.format(key) + '</figure>';
					obj.$outputs = !!obj.outputs;
					obj.outputs = obj.outputs || (com.outputs ? CLONE(com.outputs) : null);
					obj.$inputs = !!obj.inputs;
					obj.inputs = obj.inputs || (com.inputs ? CLONE(com.inputs) : null);
					obj.template = com.template ? Tangular.compile(com.template) : null;
					obj.onmake = exports.onmake;
					obj.onremove = exports.onremove;

					if (obj.connected !== false) {
						obj.connected = true;
						count++;
					}

					model.notes[obj.id] = obj.note;
					model.config[obj.id] = obj.config;
					instances.push(obj);
				}

				exports.set('connected', count);
				exports.set('data', response);
				exports.set('changed', uninitializedcount > 0);
				exports.set('instances', instances);

				setTimeout2(exports.id + 'ready', function() {
					exports.set('ready', true);
					exports.upd('config');
				}, 500);

				Designer.CMD('flow.refresh');
				setTimeout(() => model.main.exec('*', 'redraw'), 200);
			};

				SETTER('approve/show', '@(Are you sure you want to apply the current design?)', '"ti ti-check-circle" @(Continue)', function() {

					if (BLOCKED('save', 2000))
						return;

					let checkio = function(a, b) {
						if (!a)
							return;
						if (!b)
							return a;
						if (a.length !== b.length)
							return a;
						for (let i = 0; i < a.length; i++) {
							if (a[i].id !== b[i].id || a[i].name !== b[i].name)
								return a;
						}
					};

					let output = {};
					let keys = Object.keys(model.data);

					for (let i = 0; i < keys.length; i++) {
						let key = keys[i];
						let com = model.data[key];

						if (key === 'paused' || key === 'groups' || key === 'tabs') {
							output[key] = com;
							continue;
						}

						let item = {};
						item.id = com.id;
						item.connections = com.connections;
						item.config = com.config;
						item.component = com.component;

						// Check if the component exists
						var c = model.components.findItem('id', com.component);
						if (!c)
							continue;

						if (com.outputs)
							item.outputs = checkio(com.outputs, c.outputs);

						if (com.inputs)
							item.inputs = checkio(com.inputs, c.inputs);

						item.x = com.x;
						item.y = com.y;
						item.note = com.note;
						item.tab = com.tab;
						item.connected = true;
						com.changes = null;
						com.connected = true;
						output[item.id] = item;
					}

					$('.isnewbie').rclass('isnewbie');
					exports.set('changed', false);
					SETTER('websocket/send', { TYPE: 'save', data: output });
					Designer.CMD('flow.reset');
				});

			};

			exports.findinvalue = function(val, search) {
				if (val) {
					val = val.toString();
					var index = val.toLowerCase().indexOf(search);
					if (index !== -1) {
						var beg = index - 20;
						if (beg < 0)
							beg = 0;
						return val.substring(beg, index + search.length + 20);
					}
				}
			};

			exports.watch('search', function(value) {

				var arr = [];

				if (!value) {
					for (let key in flow.data) {
						if (key !== 'groups' && key !== 'paused' && key !== 'tabs')
							arr.push({ key: key, value: flow.data[key], text: '' });
					}
					exports.set('response', arr);
					return;
				}

				value = value.toLowerCase();

				for (let key in flow.data) {

					if (key === 'groups' || key === 'paused' || key === 'tabs')
						continue;

					let instance = flow.data[key];

					let res = exports.findinvalue(instance.Component.name, value);
					if (res)
						arr.push({ key: instance.id, value: instance, text: '', type: '@(name)' });

					res = exports.findinvalue(instance.id, value);
					if (res)
						arr.push({ key: instance.id, value: instance, text: '', type: '@(ID)' });

					if (instance.note) {
						res = exports.findinvalue(instance.note, value);
						if (res)
							arr.push({ key: instance.id, value: instance, text: res, type: '@(note)' });
					}

					let values = Object.values(instance.config);
					for (let val of values) {
						if (val instanceof Array) {
							for (let m of val) {
								let values2 = Object.values(m);
								for (let val2 of values2) {
									res = exports.findinvalue(val2, value);
									res && arr.push({ key: instance.id, value: instance, text: res, type: '@(configuration)' });
								}
							}
						} else {
							res = exports.findinvalue(val, value);
							res && arr.push({ key: instance.id, value: instance, text: res, type: '@(configuration)' });
						}
					}
				}

				exports.set('response', arr);
			}, true);

		});

						let b = str.charAt(index - 1);
						let e = str.charAt(index + key.length);
						if ((!b || allowed.includes(b)) && (!e || allowed.includes(e))) {
							str = str.substring(0, index) + keywords[key] + str.substring(index + key.length);
							index += keywords[key].length;
						} else
							index += key.length;
					}
				}
			}

			return str;
		};

		SETTER('exec/register @important', function(attr, el, e, type) {
			var c = attr.charAt(0);
			if (c === '=' || c === '/') {
				var id = ATTRD(el);
				var instance = flow.main.instances[id];
				if (instance) {
					attr = attr.substring(1);
					instance[attr] && instance[attr](el, e);
				}
				return true;
			}
		});

	</script>

	<script>

		// @TAG: Events

		ON('online', function(is) {
			if (!is)
				FLAGS('@showloading');
		});

		ON('@flag saved', function() {
			SETTER('notify/success', '@(Saved.)');

		ON('@flag done', function() {

		});

		$(W).on('message', function(e) {
			var data = e.originalEvent.data;
			if (data) {
				var msg = PARSE(data);
				if (msg && msg.TYPE) {
					switch (msg.TYPE) {
						case 'shortcut':
							SETTER('shortcuts/exec', msg.key);
							break;
						case 'darkmode':
							APPEARANCE({ darkmode: msg.value === true });
							break;
						case 'components':
							flow.editable.components.download = msg.value;
							break;
						case 'EXEC':
						case 'SETTER':
						case 'EMIT':
							W[msg.TYPE](msg.name, msg.a, msg.b, msg.c, msg.d);
							break;
					}
				}
			}
		});

	</script>

	<script>

		// @TAG: TOUCH

		(function() {

			var meta = {};

			function inDOM(el) {
				if (!el)
					return;
				if (el.tagName === 'BODY')
					return true;
				var parent = el.parentNode;
				while (parent) {
					if (parent.tagName === 'BODY')
						return true;
					parent = parent.parentNode;
				}
			}

			function Instance(instance, el) {
				var t = this;
				t.id = instance.id;
				t.name = instance.name;
				t.instance = instance;
				t.element = el;
				t.dom = el[0];
				if (meta.pending[t.id]) {
					clearTimeout(meta.pending[t.id]);
					delete meta.pending[t.id];
				}
				el.on('click', 'button,.clickable', function() {
					t.click && t.click($(this));
				});
			}

			Instance.prototype = {

				get config() {
					return flow.config[this.instance.id];
				},

				set config(val) {
					this.instance.config = flow.config[this.instance.id] = val;
					UPD('flow.config.' + this.instance.id);
				}

			};

			Instance.prototype.draft = function(path, value) {

				if (common.form !== 'settings')
					return;

				if (flow.settingsid !== this.instance.component)
					return;

				if (path && typeof(path) === 'object') {
					value = path;
					path = '';
				}

				var p = 'flow.settings.settings_f' + this.instance.component + (path ? ('.' + path) : '');
				if (value === undefined)
					return GET(p);
				SET(p, value);
			};

			Instance.prototype.rebind = function(type) {
				type && UPD('flow.' + type + '.' + this.instance.id);
			};

			Instance.prototype.reconfigure = function(val) {
				FUNC.reconfigure(this.id, val || this.instance.config);
			};

			Instance.prototype.trigger = function(data) {
				FUNC.trigger(this.id, data);
			};

			Instance.prototype.action = function(name, data, callback) {
				EXEC('flow/action', name, data, callback);
			};

			Instance.prototype.call = function(data, callback, globalcall) {
				var callbackid = GUID(10);
				if (typeof(data) === 'function') {
					callback = data;
					data = null;
				}
				flow.calls[callbackid] = callback;
				SETTER('websocket/send', { TYPE: 'call', id: globalcall ? ('@' + this.instance.component) : this.id, data: data, callbackid: callbackid });
			};

			Instance.prototype.$destroy = function() {
				var t = this;
				delete meta.instances[t.id];
				t.close && t.close();
			};

			meta.components = {};
			meta.instances = {};
			meta.current = '';
			meta.pending = {};

			function reinit(id) {
				var instance = flow.data[id];
				if (instance)
					meta.init(instance.name, instance, $('.component[data-id="' + id + '"]'), true);
				delete meta.pending[id];
			}

			W.TOUCH = function(fn) {
				var name = flow.current;
				var checksum = flow.checksum;
				if (name) {
					if (meta.components[name]) {
						if (meta.components[name].checksum !== checksum) {
							for (var key in flow.data) {
								if (key !== 'groups' && key !== 'paused' && key !== 'tabs') {
									var tmp = flow.data[key];
									if (tmp.name === name)
										meta.pending[tmp.id] = setTimeout(reinit, 1000, tmp.id);
								}
							}
						}
					}
					meta.components[name] = { fn: fn, checksum: checksum };
				}
			};

			meta.exec = function(id, type, val) {
				if (id === '*') {
					for (var key in meta.instances)
						meta.exec(key, type, val);
				} else {
					var instance = meta.instances[id];
					if (instance && instance[type])
						instance[type](val);
				}
			};

			meta.init = function(name, instance, el, reinit) {
				var tmp = meta.components[name];
				if (tmp) {
					if (meta.instances[instance.id])
						meta.instances[instance.id].$destroy();
					var obj = new Instance(instance, el);
					meta.instances[instance.id] = obj;
					tmp.fn(obj, reinit);
					obj.configure && obj.configure(flow.config[instance.id], true);
					obj.status && obj.status(flow.status[instance.id], true);
					obj.note && obj.note(flow.notes[instance.id], true);
				}
			};

			meta.remove = function(id) {
				var instance = meta.instances[id];
				instance && instance.$destroy();
			};

			ON('service', function() {
				for (var key in meta.instances) {
					var instance = meta.instances[key];
					if (!inDOM(instance.dom))
						instance.$destroy();
				}
			});

			W.flowinstances = flow.main = meta;

		})();

	</script>

	<script>

		// Helpers

		function pSBC(p,c0,c1,l) {
			let r,g,b,P,f,t,h,m=Math.round,a=typeof(c1)=='string';
			if(typeof(p)!='number'||p<-1||p>1||typeof(c0)!='string'||(c0[0]!='r'&&c0[0]!='#')||(c1&&!a))return null;
			h=c0.length>9,h=a?c1.length>9?true:c1=='c'?!h:false:h,f=pSBC.pSBCr(c0),P=p<0,t=c1&&c1!='c'?pSBC.pSBCr(c1):P?{r:0,g:0,b:0,a:-1}:{r:255,g:255,b:255,a:-1},p=P?p*-1:p,P=1-p;
			if(!f||!t)return null;
			if(l)r=m(P*f.r+p*t.r),g=m(P*f.g+p*t.g),b=m(P*f.b+p*t.b);
			else r=m((P*f.r**2+p*t.r**2)**0.5),g=m((P*f.g**2+p*t.g**2)**0.5),b=m((P*f.b**2+p*t.b**2)**0.5);
			a=f.a,t=t.a,f=a>=0||t>=0,a=f?a<0?t:t<0?a:a*P+t*p:0;
			if(h)return'rgb'+(f?'a(':'(')+r+','+g+','+b+(f?','+m(a*1000)/1000:'')+')';
			else return'#'+(4294967296+r*16777216+g*65536+b*256+(f?m(a*255):0)).toString(16).slice(1,f?undefined:-2);
		}

		pSBC.pSBCr=(d)=>{
			const i=parseInt;
			let n=d.length,x={};
			if(n>9){
				var [r, g, b, a] = (d = d.split(','));n = d.length;
				if(n<3||n>4)return null;
				x.r=i(r[3]=="a"?r.slice(5):r.slice(4)),x.g=i(g),x.b=i(b),x.a=a?parseFloat(a):-1;
			}else{
				if(n==8||n==6||n<4)return null;
				if(n<6)d="#"+d[1]+d[1]+d[2]+d[2]+d[3]+d[3]+(n>4?d[4]+d[4]:"");
				d=i(d.slice(1),16);
				if(n==9||n==5)x.r=d>>24&255,x.g=d>>16&255,x.b=d>>8&255,x.a=Math.round((d&255)/0.255)/1000;
				else x.r=d>>16,x.g=d>>8&255,x.b=d&255,x.a=-1;
			}return x;
		};

		Thelpers.color = function(value) {
			var hash = HASH(value, true);
			var color = '#';
			for (var i = 0; i < 3; i++) {
				var value = (hash >> (i * 8)) & 0xFF;
				color += ('00' + value.toString(16)).substr(-2);
			}
			return pSBC(0.2, color);
		};

		Thelpers.highlight = function(val, colorize) {

			if (!val)
				return val;

			return val.replace(/\{.*?\}/g, function(text) {
				return '<code' + (colorize ? ' style="color:{0}"'.format(Thelpers.color(text)) : '') + '>' + text + '</code>';
			});

		};

		Thelpers.filesize2 = function(value) {
			return typeof(value) === 'number' ? value.filesize(1) : DEF.empty;
		};

		Thelpers.url = function(val) {
			var index = val.indexOf('/', 10);
			return index === -1 ? val : val.substring(0, index);
		};

		FUNC.trigger = function(el, data) {
			return PLUGINS.flow.trigger(el, data);
		};

		FUNC.readme = function(title, text) {

			let winid = 'readme' + HASH(text);

			if (common.windows.findItem('id', winid)) {
				SETTER('windows/focus', winid);
				return;
			}

			let html = $($('#template_readme').html());
			html.find('.markdown-small').html(Thelpers.markdown(FUNC.strim(text || ''), { el: html }));
			PUSH('*windows', { id: winid, cache: 'readme', html: html, title: title, actions: { move: true, autosave: true, close: true, maximize: false, minimize: false }, offset: { x: ((WW / 2) - 275) >> 0, y: ((WH / 2) - 250) >> 0, width: 550, height: 500, minwidth: 200, minheight: 300, maxwidth: 800, maxheight: 1200 }, make: el => el.closest('.ui-windows-item').css('z-index', 50) });

		};

		FUNC.makeid = function(type) {
			return type + Date.now().toString(36).slice(4) + Math.random().toString(16).slice(10);
		};

		FUNC.reconfigure = function(el, config) {
			PLUGINS.flow.reconfigure(el, config);
		};

		FUNC.rtrim = function(value) {
			let lines = value.split('\n');
			let reg = /\s+$/;
			for (let i = 0; i < lines.length; i++)
				lines[i] = lines[i].replace(reg, '');
			return lines.join('\n').replace(new RegExp(String.fromCharCode(160), 'g'), ' ');
		};

		FUNC.strim = function(value) {

			let c = value.charAt(0);
			if (c !== ' ' && c !== '\t')
				return value;

			for (let i = 0; i < value.length; i++) {
				c = value.charAt(i);
				if (c !== ' ' && c !== '\t')
					break;
			}

			let count = i;
			let lines = value.split('\n');

			for (let i = 0; i < lines.length; i++) {
				let line = lines[i];
				if (line.length > count) {
					if ((/^[\s\t]+$/g).test(line.substring(0, count)))
						lines[i] = line.substring(count);
				}
			}

			return lines.join('\n');
		};

		FUNC.hex2rgba = function(hex, opacity) {

			var c = (hex.charAt(0) === '#' ? hex.substring(1) : hex).split('');

			if(c.length === 3)
				c = [c[0], c[0], c[1], c[1], c[2], c[2]];

			var a = c.splice(6);
			if (a.length)
				a = parseFloat(parseInt((parseInt(a.join(''), 16) / 255) * 1000) / 1000);
			else
				a = opacity || '1';

			c = '0x' + c.join('');
			return 'rgba(' + [(c >> 16) & 255, (c >> 8) & 255, c & 255].join(',') + ',' + a + ')';
		};

		// Connect WS
		$(document.body).append('<ui-component name="websocket" config="url:{0};stats:flow/stats;statsinterval:61000"></ui-component>'.format(flow.socket.replace(/\:/g, '\\:')));

	</script>
